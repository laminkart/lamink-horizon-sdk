# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load version pins from versions.env
        run: |
          set -a
          source docker/versions.env
          set +a
          echo "ARDUSUB_COMMIT=$ARDUSUB_COMMIT" >> $GITHUB_ENV
          echo "ARDUPILOT_GAZEBO_COMMIT=$ARDUPILOT_GAZEBO_COMMIT" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Extract metadata (tags, labels) for Docker headless
        id: meta_headless
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/kas-lab/suave-headless
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push kasm-jammy image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfile-kasm-core-jammy
          push: true
          tags: ${{ env.REGISTRY }}/kas-lab/kasm-jammy
          labels: latest

      - name: Build and push suave image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfile-suave
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/kas-lab/kasm-jammy:latest
            ARDUSUB_COMMIT=${{ env.ARDUSUB_COMMIT }}
            ARDUPILOT_GAZEBO_COMMIT=${{ env.ARDUPILOT_GAZEBO_COMMIT }}

      - name: Build and push suave headless image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/dockerfile-suave-headless
          push: true
          tags: ${{ steps.meta_headless.outputs.tags }}
          labels: ${{ steps.meta_headless.outputs.labels }}
          build-args: |
            ARDUSUB_COMMIT=${{ env.ARDUSUB_COMMIT }}
            ARDUPILOT_GAZEBO_COMMIT=${{ env.ARDUPILOT_GAZEBO_COMMIT }}
